name: Test

on:
  push:
    branches: [main, ubuntu]
  pull_request:
    branches: [main, ubuntu]

jobs:
  # ─────────────────────────────────────────────────────────────
  #  Lint — shellcheck all scripts
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck -x install.sh
          shellcheck scripts/utils.sh
          shellcheck scripts/backup.sh

  # ─────────────────────────────────────────────────────────────
  #  Dry Run — verify configs copy to correct locations
  # ─────────────────────────────────────────────────────────────
  dry-run:
    name: Dry Run (Ubuntu Server)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install base packages
        run: sudo apt-get install -y bash coreutils git zsh

      - name: Create mock commands
        run: |
          # Mock apt-get — skips real package installation
          printf '#!/bin/bash\necho "[MOCK] apt-get $*"\n' > /tmp/apt-get
          sudo install -m 755 /tmp/apt-get /usr/local/bin/apt-get

          # Mock curl — outputs a no-op script (used by oh-my-zsh / atuin installers)
          printf '#!/bin/bash\necho "echo [MOCK] skipped"\n' > /tmp/curl
          sudo install -m 755 /tmp/curl /usr/local/bin/curl

          # Mock ya (yazi package manager)
          printf '#!/bin/bash\necho "[MOCK] ya $*"\n' > /tmp/ya
          sudo install -m 755 /tmp/ya /usr/local/bin/ya

          # Mock chsh — not needed in container
          printf '#!/bin/bash\necho "[MOCK] chsh $*"\n' > /tmp/chsh
          sudo install -m 755 /tmp/chsh /usr/local/bin/chsh

      - name: Pre-create dirs to simulate already-installed tools
        run: |
          mkdir -p "$HOME/.oh-my-zsh"
          mkdir -p "$HOME/.config/zsh/zsh-autosuggestions"
          mkdir -p "$HOME/.config/zsh/zsh-syntax-highlighting"
          mkdir -p "$HOME/.config/zsh/powerlevel10k"
          # Simulate already-installed binaries
          sudo touch /usr/local/bin/atuin  && sudo chmod +x /usr/local/bin/atuin
          sudo touch /usr/local/bin/zoxide && sudo chmod +x /usr/local/bin/zoxide
          sudo touch /usr/local/bin/eza    && sudo chmod +x /usr/local/bin/eza
          sudo touch /usr/local/bin/duf    && sudo chmod +x /usr/local/bin/duf
          sudo touch /usr/local/bin/yazi   && sudo chmod +x /usr/local/bin/yazi

      - name: Run install script
        run: yes | bash install.sh

      - name: Verify configs copied to correct locations
        run: |
          errors=0

          check() {
            if [ -e "$1" ]; then
              echo "  ✓ $1"
            else
              echo "  ✗ MISSING: $1"
              errors=$((errors + 1))
            fi
          }

          echo ""
          echo "── Shell & Terminal ──────────────────────────"
          check "$HOME/.zshrc"
          check "$HOME/.p10k.zsh"
          check "$HOME/.tmux.conf"

          echo ""
          echo "── CLI Tools ─────────────────────────────────"
          check "$HOME/.config/bat/config"
          check "$HOME/.config/btop/btop.conf"
          check "$HOME/.config/atuin/config.toml"
          check "$HOME/.config/yazi/yazi.toml"
          check "$HOME/.config/yazi/keymap.toml"
          check "$HOME/.config/yazi/init.lua"
          check "$HOME/.config/yazi/package.toml"
          check "$HOME/.config/ripgrep/config"

          echo ""
          if [ "$errors" -gt 0 ]; then
            echo "FAILED — $errors config(s) missing"
            exit 1
          fi

          echo "All configs verified successfully."
